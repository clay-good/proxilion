<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Proxilion">
  <title>Proxilion</title>
  <rect width="64" height="64" rx="14" fill="#0d1117"/>
  <!-- Capability chain motif: three bars shrinking monotonically, reflecting the
       PIC invariant that each successor authority is a subset of its predecessor. -->
  <g fill="#00e5a8">
    <rect x="14" y="18" rx="3" width="36" height="6"/>
    <rect x="14" y="29" rx="3" width="28" height="6"/>
    <rect x="14" y="40" rx="3" width="20" height="6"/>
  </g>
</svg>
