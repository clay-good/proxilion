  <g fill="#00e5a8">
    <rect x="144" y="184" rx="20" width="224" height="40"/>
    <rect x="144" y="248" rx="20" width="176" height="40"/>
    <rect x="144" y="312" rx="20" width="128" height="40"/>
  </g>
</svg>
