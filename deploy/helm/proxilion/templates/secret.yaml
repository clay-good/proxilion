{{/*
Secret manifest — only rendered when `secrets.existingSecret` is empty.
Production deploys SHOULD pre-create the Secret out-of-band (via SOPS,
external-secrets, Vault, etc.) and reference it by name. The inline path
exists for `helm template` previews and dev-cluster bootstraps only.
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proxilion.secretsName" . }}
  labels:
    {{- include "proxilion.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ required "secrets.inline.databaseUrl required when no existingSecret" .Values.secrets.inline.databaseUrl | quote }}
  token-encryption-key: {{ required "secrets.inline.tokenEncryptionKey required" .Values.secrets.inline.tokenEncryptionKey | quote }}
  google-client-id: {{ .Values.secrets.inline.googleClientId | quote }}
  google-client-secret: {{ .Values.secrets.inline.googleClientSecret | quote }}
  trust-plane-cat-key: {{ required "secrets.inline.trustPlaneCatKey required" .Values.secrets.inline.trustPlaneCatKey | quote }}
  {{- if .Values.proxy.env.siem.enabled }}
  siem-hmac-key: {{ required "secrets.inline.siemHmacKey required when siem.enabled" .Values.secrets.inline.siemHmacKey | quote }}
  {{- end }}
{{- end }}
