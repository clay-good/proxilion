name: coverage

# qiuth-patterns.md §6 — coverage threshold gate.
#
# Phase ladder (per §6.4 status block):
#   adoption | 35% / 42%  (2026-05-14 honest reset; floor was red on day-1)
#   round-6  | 45% lines / 55% functions  ← current floor
#               (measured 47.72 / 56.67 after rounds 1–7 of pure-helper
#                test backfill; +12.6 / +12.7 points over adoption.)
#   later    | 70% / 70% — long-term target. Earned by wiremock+postgres
#               integration tests against api/* handlers + a server.rs
#               boot-path harness — both still pending.
#
# Don't ratchet without expanding the test surface first. The original
# 60/60 floor (b7d618b) was set aspirationally above measured reality and
# the gate was red on `main` from the day it landed; this floor is what
# the workspace actually clears today, so a regression below it is real.

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Required for the SHA-pinned upstream git deps (pic-protocol, provenance-*).
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  llvm-cov:
    name: cargo llvm-cov
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        run: |
          rustup toolchain install stable --component llvm-tools-preview --no-self-update
          rustup default stable

      - name: cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: coverage-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-

      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: run coverage
        # Skip the perf-test that's #[cfg_attr(debug_assertions, ignore)] —
        # llvm-cov runs against the test profile (debug), so the perf test
        # would no-op anyway. Emit both lcov (for downstream uploaders)
        # and JSON (for the per-crate gate below).
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(^|/)tests/' \
            --no-fail-fast
          cargo llvm-cov report --json --output-path coverage.json \
            --ignore-filename-regex '(^|/)tests/'
          # Render the summary so PR reviewers see numbers in the log.
          cargo llvm-cov report --summary-only

      - name: enforce workspace coverage floor
        # 45% lines / 55% functions. The workspace floor is the wider
        # safety net; the per-crate gate below catches narrower drops
        # (e.g. shared-types or policy-engine regressing alone).
        run: |
          cargo llvm-cov report \
            --fail-under-lines 45 \
            --fail-under-functions 55

      - name: enforce per-crate coverage floors
        # Locks the well-covered crates (shared-types, policy-engine) so
        # they can't slip while the workspace average masks the loss.
        # Floor values live in the script — bump alongside test backfill.
        run: ./scripts/coverage-per-crate.sh coverage.json

      - name: upload lcov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lcov-report
          path: lcov.info
          if-no-files-found: error
