name: image

# Proxy container image publish (production-readiness.md PR-11).
#
# On a `v*.*.*` tag: build a multi-arch (amd64 + arm64) image from
# docker/proxy.Dockerfile, push to GHCR, Trivy-scan it (gating on FIXABLE
# HIGH/CRITICAL), sign it with cosign keyless (Sigstore — PR-10), and emit
# the digest to pin in the Helm chart's values.yaml (proxy.image.digest).
#
# buildx attaches SLSA provenance + an SBOM attestation to the image
# (provenance/sbom below), so the published image is verifiable end to end.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist; e.g. v0.1.0)"
        required: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/proxilion-proxy

permissions:
  contents: read
  packages: write        # push to GHCR
  id-token: write        # cosign keyless (OIDC)
  attestations: write    # build provenance attestation

jobs:
  build-push-sign:
    name: build, scan, sign proxy image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: build + push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/proxy.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true   # SLSA build provenance attestation
          sbom: true         # SBOM attestation

      - name: Trivy scan (gate on fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true   # gate only on issues we can actually fix
          exit-code: "1"

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: cosign sign (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"

      - name: record digest to pin
        run: |
          {
            echo "### Proxy image published"
            echo ""
            echo '```'
            echo "${IMAGE}@${{ steps.build.outputs.digest }}"
            echo '```'
            echo ""
            echo "Pin it in deploy/helm/proxilion/values.yaml -> proxy.image.digest"
          } >> "$GITHUB_STEP_SUMMARY"
