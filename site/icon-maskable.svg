<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Proxilion">
  <title>Proxilion</title>
  <!-- Maskable: full-bleed background so the safe-zone crop on Android (80% inner)
       still leaves a coherent mark visible. -->
