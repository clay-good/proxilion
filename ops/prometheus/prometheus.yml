# Proxilion — Prometheus scrape config.
#
# The proxy exposes OpenMetrics at `GET /metrics` on its TLS port (spec.md
# §3.2). Drop this in as your Prometheus config, or merge the `proxilion`
# scrape job into an existing one. Pair it with the Grafana dashboard in
# ../grafana/proxilion.json and the metric catalogue in ../README.md.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting rules + SLOs (production-readiness.md PR-5). See alerts.yml for the
# rule set and ../../docs/ops/slos.md for the SLO definitions + rationale.
rule_files:
  - alerts.yml

# Point this at your Alertmanager (routing/severity in docs/ops/slos.md).
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: proxilion
    metrics_path: /metrics
    scheme: https
    tls_config:
      # Dev only: the compose stack self-issues a cert on first boot, so the
      # scraper can't verify it. In production, drop `insecure_skip_verify`
      # and point `ca_file` at the CA bundle that signed the proxy's cert:
      #   ca_file: /etc/prometheus/proxilion-ca.pem
      insecure_skip_verify: true
    static_configs:
      # Compose service name + TLS port. Replace with your proxy's address
      # (and add more targets behind a load balancer as needed).
      - targets: ["proxy:8443"]

# Alerting rules now live in alerts.yml (loaded via `rule_files` above),
# including the `ProxilionPcaVerifyFailure` page — the one series that must
# always read zero (a tampered PCA or stale CAT key). See docs/ops/slos.md.
